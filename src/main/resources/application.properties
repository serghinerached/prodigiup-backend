# ===============================
# Datasource (PostgreSQL Neon)
# ===============================
spring.datasource.url=jdbc:postgresql://ep-young-bread-alxnumh4-pooler.c-3.eu-central-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_6hsaRVj8xpIc
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# HikariCP settings
# ===============================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.pool-name=HikariPool-1

# Forcing SSL connection to Neon
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Optional: improve startup time if DB sleeps (Neon free tier)
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true